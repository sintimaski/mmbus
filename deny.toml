# cargo-deny configuration.
#
# Run locally: cargo deny check
# In CI:       .github/workflows/audit.yml
#
# Reference: https://embarkstudios.github.io/cargo-deny/

[advisories]
yanked = "warn"
ignore = [
    # RUSTSEC-2025-0020 — PyO3 0.22.6 `PyString::from_object` can read
    # past the end of a `&str` containing interior NULs.  We don't call
    # `PyString::from_object` anywhere in the codebase (we use
    # `PyBytes::new_bound_with` + Python-side string args validated by
    # `&str` extraction).  Tracked for resolution in the PyO3 0.22 →
    # 0.28 migration (v0.2.x).
    "RUSTSEC-2025-0020",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "0BSD",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
