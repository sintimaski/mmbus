# Sample mmbus-bridge config.  Copy + edit; pass the path as the only
# positional argument:
#
#   mmbus-bridge ./bridge.toml

# Local mmbus bus this bridge attaches to.
bus = "demo"

# Optional: override the mmbus base_dir.  Defaults to the mmbus crate
# default (`/tmp/mmbus` on Unix, `%LOCALAPPDATA%\mmbus` on Windows).
# base_dir = "/var/lib/mmbus"

# Optional: stable 64-bit origin_id.  When omitted, the binary picks a
# fresh random value at startup; that means loop-prevention dedup
# windows reset after a restart, which is fine for most use cases.
# origin_id = 1234567890123456789

# Optional QUIC settings (require `cargo install --features quic`).
# Uncomment to accept incoming QUIC connections; the bridge creates a
# self-signed cert at first start and logs its fingerprint — copy that
# fingerprint into the peer bridge's `peer_cert_fingerprint`.
# listen_quic = "0.0.0.0:4443"
# quic_cert_path = "/var/lib/mmbus/bridge.cert.der"   # default: base_dir/bridge.cert.der
# quic_key_path  = "/var/lib/mmbus/bridge.key.der"    # default: base_dir/bridge.key.der
# quic_worker_threads = 2                              # default: 2

# Topics this bridge cares about.  `forward = true` (the default) sends
# locally-published messages to all peers; `receive = true` (the
# default) republishes peer-originated messages locally.
[[topics]]
name = "events"

[[topics]]
name = "alerts"
forward = true
receive = false   # ingest-only: alerts only flow OUT to peers

# Peers in the mesh.  Each entry is a separate process on another
# machine running its own `mmbus-bridge`.  No discovery in v1 — the
# endpoint list is the topology.
#
# `preshared_key` does double duty since B4a:
#   * Outbound: included in this bridge's PeerHello to that endpoint
#     (the remote bridge accepts the connection if it sees the PSK in
#     ITS own peers list).
#   * Inbound: when this bridge accepts a connection, the offered
#     PeerHello PSK must match one of THIS list's preshared_keys.
# Symmetric meshes typically share the same PSK between A→B and B→A
# entries.  Today the PSK travels over plaintext TCP; QUIC (B4b) will
# wrap it in TLS so it isn't visible on the wire.
[[peers]]
name = "machine-b"
endpoint = "machine-b.internal:4443"
preshared_key = "REPLACE-ME-WITH-A-LONG-RANDOM-STRING"
# transport = "tcp"   # default; "quic" requires the matching feature
                       # build + a peer_cert_fingerprint below.

# Example QUIC peer.  Uncomment + edit to enable.
