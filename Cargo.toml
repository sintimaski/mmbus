[package]
name = "mmbus"
version = "0.1.0"
edition = "2021"
description = "Zero-copy pub/sub over mmap for local IPC"
license = "MIT"
readme = "README.md"

[lib]
name = "mmbus"
# cdylib = Python extension (.so); rlib = Rust dependency
crate-type = ["cdylib", "rlib"]

[features]
python = ["pyo3"]

[dependencies]
memmap2 = "0.9"
thiserror = "1"
pyo3 = { version = "0.22", features = ["extension-module"], optional = true }

# Unix uses libc directly (eventfd, flock, sendmsg, etc.).
[target.'cfg(unix)'.dependencies]
libc = "0.2"

# CRC32C with hardware acceleration on x86 (SSE 4.2) and aarch64 (ARMv8
# CRC) — used by the WAL Phase B segment writer / reader.  Tiny dep
# (~300 LOC of Rust + intrinsics), zero impact on the no-WAL build path
# since BusConfig.wal defaults to disabled.
[dependencies.crc32c]
version = "0.6"

# Windows uses windows-sys for LockFileEx, CreateNamedPipe, CreateSemaphore,
# DuplicateHandle, WaitForMultipleObjects.  Feature gates keep the
# downloaded surface area small.
[target.'cfg(windows)'.dependencies.windows-sys]
version = "0.59"
features = [
    "Win32_Foundation",
    "Win32_Storage_FileSystem",
    "Win32_System_IO",
    "Win32_System_Pipes",
    "Win32_System_Threading",
    "Win32_Security",
]

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
tempfile = "3"

[[example]]
name = "producer"

[[example]]
name = "consumer"

[[bench]]
name = "ring"
harness = false

[[bench]]
name = "e2e"
harness = false

[[bench]]
name = "publish_with_wal"
harness = false
