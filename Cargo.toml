[package]
name = "mmbus"
version = "0.1.0"
edition = "2021"
description = "Zero-copy pub/sub over mmap for local IPC"

[dependencies]
memmap2 = "0.9"
thiserror = "1"
libc = "0.2"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[example]]
name = "producer"

[[example]]
name = "consumer"

[[bench]]
name = "ring"
harness = false

[[bench]]
name = "e2e"
harness = false
