name: Build wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
          - os: ubuntu-latest
            target: aarch64
            manylinux: auto
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x64

    steps:
      - uses: actions/checkout@v4

      # PyO3/maturin-action@v1 handles:
      #  - manylinux container selection for Linux targets (provides
      #    a target-arch Python interpreter, fixing the "Couldn't find
      #    any python interpreters" error on aarch64 cross-builds).
      #  - QEMU setup for aarch64 Linux.
      #  - Native build for macOS / Windows.
      # PyO3 0.22's Python version cap (3.13) is satisfied because the
      # manylinux container ships Python 3.12.
      # Pin Python to 3.12 so maturin doesn't pick 3.14 (the latest
       # in maturin-action's cache) and trip PyO3 0.22's max-version
       # check.  Will be removed in v0.2.x after the PyO3 upgrade.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --out dist --features python --interpreter python3.12
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
