name: CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Windows port is in progress (see docs/plan-rfcs.md, stages W0..W5).
    # Don't fail the whole CI run if Windows is red while we wire it up.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # Swatinem/rust-cache@v2 picks the right paths (target, registry,
      # git index, .cargo/bin), keys on Cargo.lock + toolchain, prunes
      # build artifacts that don't benefit from caching, and is the
      # de-facto-standard Rust CI cache.  Replaced manual actions/cache.
      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --all-features

      - name: cargo clippy
        run: cargo clippy --all-features -- -D warnings
