name: CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # Swatinem/rust-cache@v2 picks the right paths (target, registry,
      # git index, .cargo/bin), keys on Cargo.lock + toolchain, prunes
      # build artifacts that don't benefit from caching, and is the
      # de-facto-standard Rust CI cache.  Replaced manual actions/cache.
      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --all-features

      - name: cargo clippy
        run: cargo clippy --all-features -- -D warnings

      # Build the Python extension and run the cross-platform smoke
      # harness on every OS.  Windows-incompatible smokes
      # (asyncio.add_reader, fastapi without httpx, np_pipeline without
      # numpy) skip themselves with a logged reason.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build + install Python extension
        # `pip install .` triggers the maturin build backend declared in
        # pyproject.toml — no manual `maturin develop` (which needs a
        # venv) required.  `[tool.maturin]` already pins
        # `features = ["python"]`.
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Python smoke
        run: python python/smoke_test.py

  bridge:
    name: Bridge (${{ matrix.os }}, ${{ matrix.features }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # The bridge crate is a standalone workspace, so it needs its
        # own job.  We test both feature configurations: TCP-only (the
        # default) and TCP+QUIC.  Windows is excluded for now — quinn
        # builds on Windows but our QUIC code hasn't been validated
        # there; the TCP-only path is exercised under the main `test`
        # job's `cargo test --all-features` invocation.
        os: [ubuntu-latest, macos-latest]
        features: ["", "--features quic"]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "bridge -> target"
          prefix-key: "v0-rust-bridge"
          key: ${{ matrix.features }}

      - name: cargo test
        working-directory: bridge
        run: cargo test ${{ matrix.features }}

      - name: cargo clippy
        working-directory: bridge
        run: cargo clippy --all-targets ${{ matrix.features }} -- -D warnings
