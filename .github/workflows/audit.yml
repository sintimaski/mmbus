name: Audit

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**/Cargo.toml"
      - "deny.toml"
      - ".github/workflows/audit.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**/Cargo.toml"
      - "deny.toml"
  schedule:
    # Daily 06:00 UTC — catches new advisories against pinned deps.
    - cron: "0 6 * * *"

jobs:
  cargo-deny:
    name: cargo-deny (advisories + licenses + bans + sources)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  cargo-audit:
    name: cargo-audit (RustSec advisory DB)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit
        # `--ignore RUSTSEC-2025-0020`: PyO3 0.22.6's `PyString::from_object`
        # advisory.  We don't call that function — verified via grep — so
        # the risk doesn't apply.  Tracked for resolution in the PyO3
        # 0.22 → 0.28 migration (v0.2.x).  Matches the parallel ignore
        # in `deny.toml` (cargo-deny has its own config; cargo-audit
        # doesn't read it).
        run: cargo audit --ignore RUSTSEC-2025-0020
