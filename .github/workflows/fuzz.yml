name: Fuzz smoke

on:
  pull_request:
    paths:
      - 'src/ring.rs'
      - 'fuzz/**'
      - '.github/workflows/fuzz.yml'
  workflow_dispatch:
    inputs:
      duration_seconds:
        description: 'How long to fuzz (seconds)'
        required: false
        default: '60'

jobs:
  fuzz:
    name: Fuzz ring_publish_receive
    runs-on: ubuntu-latest
    # Two 60s fuzz targets + build/cache overhead; 30 min is generous
    # headroom while still capping a runaway run well under the 6h default.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      # Cache the fuzz workspace specifically (separate from the parent
      # cargo workspace so the libfuzzer-instrumented target/ tree
      # doesn't pollute or invalidate the non-fuzz CI cache).
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "fuzz -> target"
          prefix-key: "v0-rust-fuzz"

      # --target x86_64-unknown-linux-gnu is explicit on purpose: recent
      # cargo-fuzz / runner images default the fuzz build to the musl target,
      # whose statically-linked libc is incompatible with the ASan sanitizer
      # ("sanitizer is incompatible with statically linked libc" + missing
      # core for the musl std).  Pinning gnu (dynamically linked, std present
      # on the nightly toolchain) restores a working sanitizer build.
      - name: Run fuzz target (ring_publish_receive)
        working-directory: fuzz
        run: |
          DURATION="${{ github.event.inputs.duration_seconds || '60' }}"
          cargo fuzz run ring_publish_receive --target x86_64-unknown-linux-gnu -- -max_total_time="$DURATION"

      - name: Run fuzz target (ring_concurrent)
        working-directory: fuzz
        run: |
          DURATION="${{ github.event.inputs.duration_seconds || '60' }}"
          cargo fuzz run ring_concurrent --target x86_64-unknown-linux-gnu -- -max_total_time="$DURATION"

      - name: Upload crash artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: fuzz/artifacts/
          if-no-files-found: ignore
